<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>C2CPriceHelper - 전략 비교</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/screens/compare.css">
</head>
<body>
  <div id="app">
    <header class="header container">
      <button class="header__back" onclick="location.href='result.html'"><span class="icon-back"></span></button>
      <h1 class="header__title text-mono">Comparison</h1>
      <div style="width: 24px;"></div>
    </header>

    <div id="stepper-root"></div>

    <main class="main container">
      <section class="section">
        <h2 class="section__title text-mono">전략 비교 표</h2>
        <div class="table-card card">
          <table class="compare-table">
            <thead>
              <tr class="text-mono">
                <th>전략</th>
                <th>판매자%</th>
                <th>구매자%</th>
                <th>판매가</th>
                <th>정산가</th>
              </tr>
            </thead>
            <tbody id="compare-table-body">
              <!-- Rows injected by JS -->
            </tbody>
          </table>
        </div>
      </section>

      <section class="section">
        <h2 class="section__title text-mono">수수료 계산 흐름</h2>
        <div class="flow-card card">
          <div class="flow-diagram">
            <div class="flow-box">
              <span class="flow-label text-mono">입력값</span>
              <p>수익 희망 범위</p>
            </div>
            <div class="flow-arrow">→</div>
            <div class="flow-box flow-box--accent">
              <span class="flow-label text-mono">계산엔진</span>
              <p>최적율 탐색</p>
            </div>
            <div class="flow-arrow">→</div>
            <div class="flow-box">
              <span class="flow-label text-mono">추천 세트</span>
              <p>3가지 전략</p>
            </div>
          </div>
        </div>
      </section>

      <section class="section">
        <h2 class="section__title text-mono">주의사항</h2>
        <ul class="edge-case-list">
          <li class="edge-case-item">
            <span class="edge-icon">⚠️</span>
            <p>플랫폼 수수료는 총 6%이며, 판매자와 구매자가 분담합니다.</p>
          </li>
          <li class="edge-case-item">
            <span class="edge-icon">⚠️</span>
            <p>정산가는 배송비를 제외한 금액입니다.</p>
          </li>
        </ul>
      </section>
    </main>
  </div>

  <script type="module" src="js/screens/compare.js"></script>
</body>
</html>
